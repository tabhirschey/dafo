<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Duct Sizing Tool</title>
  <link rel="icon" type="image/png" href="DAFO favicon.png" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="container">
    <h1>Duct Sizing Tool</h1>

    <div class="shape-selector">
  <div id="roundBtn" class="shape-btn active">
    <div class="circle-icon"></div>
    <span>Round</span>
  </div>

  <div id="rectBtn" class="shape-btn">
    <div class="rect-icon"></div>
    <span>Rectangular</span>
  </div>
</div>

    <label for="airType">Supply or Return?</label>
    <select id="airType">
      <option value="S">Supply</option>
      <option value="R">Return</option>
    </select>

    <label for="cfm">Enter airflow in CFM</label>
    <input type="number" id="cfm" placeholder="Enter CFM" />

    <!-- ROUND OPTIONS -->
    <div id="roundOptions">
      <label for="maxDiameterChoice">Is there a maximum diameter?</label>
      <select id="maxDiameterChoice">
        <option value="N">No</option>
        <option value="Y">Yes</option>
      </select>

      <div id="maxDiameterGroup" style="display: none;">
        <label for="maxDiameter">What is the maximum diameter in inches?</label>
        <input type="number" id="maxDiameter" placeholder="Example: 18" />
      </div>
    </div>

    <!-- RECTANGULAR OPTIONS -->
    <div id="rectangularOptions" style="display: none;">
      <label for="maxChoice">Is there a maximum measurement for the smaller number in the pair?</label>
      <select id="maxChoice">
        <option value="N">No</option>
        <option value="Y">Yes</option>
      </select>

      <div id="smallDimGroup" style="display: none;">
        <label for="exactSmallDim">Enter the exact measurement for the smaller number</label>
        <input type="number" id="exactSmallDim" placeholder="Example: 12" />
      </div>
    </div>

    <button id="calculateBtn">Calculate</button>

    <div id="results"></div>
  </div>

  <script src="script.js"></script>

<div class="signature">
  'Duct Around & Find Out' by Tab Hirschey
</div>

</body>
</html>
