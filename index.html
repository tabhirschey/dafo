<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Download Duct Sizing Tool</title>
  <link rel="icon" type="image/png" href="DAFO favicon.png" />
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 60px 20px;
      text-align: center;
    }

    .card {
      max-width: 700px;
      margin: 0 auto;
      background: white;
      padding: 40px 30px;
      border-radius: 16px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 42px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      color: #444;
      margin-bottom: 20px;
    }

    #version {
      font-size: 16px;
      color: #666;
      margin-bottom: 28px;
    }

    .download-btn {
      display: inline-block;
      background: #0078d7;
      color: white;
      padding: 16px 28px;
      font-size: 18px;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;
      border: none;
      cursor: pointer;
    }

    .download-btn:hover {
      opacity: 0.92;
    }

    .note {
      margin-top: 24px;
      font-size: 14px;
      color: #777;
    }

    .signature {
      position: fixed;
      bottom: 10px;
      right: 14px;
      font-size: 12px;
      color: #888;
      font-style: italic;
      opacity: 0.8;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Duct Sizing Tool</h1>
    <p>Download the latest Windows version.</p>

    <div id="version">Checking latest version...</div>

    <a
      id="downloadBtn"
      class="download-btn"
      href="#"
    >
      ⬇ Download for Windows
    </a>

    <div class="note">
      If Windows shows a warning, click <b>More info</b> → <b>Run anyway</b>.
    </div>
  </div>

  <div class="signature">
    'Duct Around &amp; Find Out'
  </div>

  <script>
    const owner = "YOURUSERNAME";
    const repo = "YOURREPO";

    async function loadLatestRelease() {
      const versionEl = document.getElementById("version");
      const downloadBtn = document.getElementById("downloadBtn");

      try {
        const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/releases/latest`);

        if (!response.ok) {
          throw new Error("Could not load latest release");
        }

        const release = await response.json();

        versionEl.textContent = `Latest version: ${release.tag_name}`;

        const installer = release.assets.find(asset =>
          asset.name === "DuctSizingToolSetup.exe"
        );

        if (installer) {
          downloadBtn.href = installer.browser_download_url;
        } else {
          downloadBtn.textContent = "Installer not found";
          downloadBtn.removeAttribute("href");
          downloadBtn.style.background = "#999";
          versionEl.textContent += " (installer asset missing)";
        }
      } catch (error) {
        versionEl.textContent = "Could not load latest version.";
        downloadBtn.textContent = "Download unavailable";
        downloadBtn.removeAttribute("href");
        downloadBtn.style.background = "#999";
        console.error(error);
      }
    }

    loadLatestRelease();
  </script>
</body>
</html>
